; Human-readable scenario descriptions for limo_scenario_motion.py
; Format: INI (stdlib configparser), ordered sections run top-to-bottom.
;
; IMPORTANT: Unified schema
; - Every scenario section MUST contain the same set of keys, even if unused.
; - Unused keys should be left blank: `key =`
;
; Units (if present):
; - heading_deg: degrees
; - distance_m: meters
; - speed_mps: meters/second
; - acc_mps2: meters/second^2
; - max_speed_mps: meters/second
; - vel_tolerance: meters/second
; - acc_tolerance: meters/second^2
; - rate_hz: Hz
; - max_duration_s / planned_time_s: seconds
; - final_speed_mps: meters/second (informational)

[meta]
type = const_acc
default_rate_hz = 100
default_max_duration_s = 50
default_vel_tolerance = 0.05
default_acc_tolerance = 0.1
default_max_speed_mps =
inter_run_pause_s = 3.0

